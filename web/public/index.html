<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bitClicker Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="topbar">
      <span class="logo">bitClicker</span>
    </header>

    <main class="workspace">

      <section class="editor-col">
        <div class="frame-tabs" id="frameTabs"></div>
        <div class="loop-row" id="loopRow"></div>

        <canvas id="grid"></canvas>

        <div class="palette-area">
          <div class="theme-select-row">
            <label for="themeSelect">Palette</label>
            <select id="themeSelect">
              <option value="primary">Primary</option>
              <option value="neon">Neon</option>
              <option value="sunset">Sunset</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="palette-flank" id="paletteFlank">
            <button class="brush-mode-btn" id="brushModeAuto" title="Draw after a brief hold">Auto</button>
            <div class="palette-grid" id="paletteBar"></div>
            <button class="brush-mode-btn" id="brushModeManual" title="Draw only while pressing hard">Manual</button>
          </div>
          <button class="btn sm danger" id="clearAllBtn">Clear frame</button>
        </div>

        <div class="history-area">
          <div class="history-title">History</div>
          <div class="history-grid" id="historyGrid"></div>
        </div>
      </section>

      <section class="preview-col">
        <div class="preview-resize left" id="previewResizeLeft" title="Drag to resize"></div>
        <div class="preview-resize right" id="previewResizeRight" title="Drag to resize"></div>
        <h3 class="panel-title">Preview</h3>
        <div class="preview-canvas-wrap">
          <canvas id="preview"></canvas>
          <div class="preview-frame-label" id="previewFrameLabel">F1</div>
        </div>
        <div class="preview-controls">
          <button class="btn preview-btn" id="previewStop"  title="Stop &amp; reset to frame 1">&#9646;&#9646;</button>
          <button class="btn preview-btn" id="previewStep"  title="Step one frame">&#9654;&#9646;</button>
          <button class="btn preview-btn" id="previewPlay"  title="Play all frames">&#9654;</button>
        </div>
      </section>

      <section class="transform-col">
        <div class="transform-head">
          <div class="file-menu-wrap">
            <button class="btn" id="fileMenuBtn">Whatnot &#9662;</button>
            <div class="file-dropdown hidden" id="fileDropdown">
              <button id="cmdNew">New</button>
              <button id="cmdLoad">Load .sga</button>
              <button id="cmdSave">Save .sga</button>
              <div class="dropdown-sep"></div>
              <div class="demo-label">Demos</div>
              <div id="demoList" class="demo-list"></div>
              <div class="dropdown-sep"></div>
              <button class="size-opt" data-size="16"><span class="check">&#10003;</span>16×16</button>
              <button class="size-opt" data-size="32"><span class="check">&#10003;</span>32×32</button>
              <div class="dropdown-sep"></div>
              <button class="theme-opt" data-theme="purply"><span class="check">&#10003;</span>Purply</button>
              <button class="theme-opt" data-theme="sky"><span class="check">&#10003;</span>Sky</button>
              <button class="theme-opt" data-theme="industrial"><span class="check">&#10003;</span>Industrial</button>
              <div class="dropdown-sep"></div>
              <button id="brushToggle"><span class="check">&#10003;</span>Mobile Brush</button>
            </div>
          </div>
        </div>
        <div class="transform-panel" id="transformPanel"></div>
      </section>

    </main>

    <nav class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="draw">Draw</button>
      <button class="mode-tab" data-mode="transform">Transform</button>
    </nav>

  </div>

  <svg id="brushCursor" class="hidden" viewBox="0 0 100 120" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="brushGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#000000"/>
      </linearGradient>
    </defs>
    <polygon class="tri" points="50,1 6,118 94,118" fill="url(#brushGrad)" stroke="#000000" stroke-width="2"/>
  </svg>

  <div id="brushDebug" class="hidden"></div>

  <input type="file" id="fileInput" accept=".sga" style="display:none">
  <input type="color" id="baseColorPicker" style="position:absolute;opacity:0;width:0;height:0;border:0;pointer-events:none">

  <script src="jszip.min.js"></script>
  <script src="anim.js"></script>
  <script src="editor.js"></script>
</body>
</html>
